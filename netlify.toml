[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = ""
  NPM_CONFIG_PRODUCTION = "false"

[context.production.environment]
  VITE_FIREBASE_API_KEY = "AIzaSyDZDDsXiyvIYe4YnHLbLpaf5tkxSSPABqk"
  VITE_FIREBASE_AUTH_DOMAIN = "assistant-f9926.firebaseapp.com"
  VITE_FIREBASE_PROJECT_ID = "assistant-f9926"
  VITE_FIREBASE_STORAGE_BUCKET = "assistant-f9926.firebasestorage.app"
  VITE_FIREBASE_MESSAGING_SENDER_ID = "1049497724244"
  VITE_FIREBASE_APP_ID = "1:1049497724244:web:1234567890abcdef"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
